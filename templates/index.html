<!DOCTYPE html>
<html>
<head>
    <title>Daily Habit Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Daily Habit Tracker</h1>
        
        <form method="POST">
            <label for="habit">Add a new habit:</label>
            <input type="text" name="habit" placeholder="e.g. Exercise, Read, Meditate">
            <button type="submit">Add Habit</button>
        </form>

        <h2>Your Habits</h2>
        <ul>
            {% for habit in habits %}
                <li class="{% if habit.done %}done{% endif %}">
                    {{ habit.name }}
                    
                    <div>
                        {% if not habit.done %}
                            <form method="POST" action="/complete/{{ loop.index0 }}" style="display:inline;">
                                <button type="submit">Mark Done</button>
                            </form>
                        {% endif %}
                        
                        <form method="POST" action="/delete/{{ loop.index0 }}" style="display:inline;">
                            <button type="submit" class="remove-btn">Remove</button>
                        </form>
                    </div>
                </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
